name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Gradle build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      # Testcontainers uses the runner's Docker daemon (preinstalled on ubuntu-latest)
      - name: Build and test
        working-directory: backend
        run: ./gradlew build --console=plain

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - name: Install
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: Build
        working-directory: frontend
        run: bun run build
      # Lint is not enforced repo-wide yet: the Lovable-generated code predates the
      # prettier config. Enforce per-file in review until a one-time format pass lands.
