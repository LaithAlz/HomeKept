# Test configuration — Testcontainers overrides the datasource URL via @ServiceConnection
spring:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  timezone: America/Toronto
  # Tests run with dev-mode=false (the prod-like default) so the startup guard in
  # JwtService exercises the prod code path. The signing key below is a real
  # non-sentinel ≥32-byte value so the guard passes.
  dev-mode: false
  secure-cookies: false
  cors:
    allowed-origins:
      - http://localhost:5173
  jwt:
    # Placeholder, ≥32 bytes — not a real secret; only needs to be non-blank and
    # long enough to pass the JwtService startup guard in prod mode (dev-mode=false).
    signing-key: "test-only-not-a-real-signing-key-placeholder-xx"
    access-token-expiry-seconds: 900
    refresh-token-expiry-seconds: 604800
  encryption:
    # PLACEHOLDER TEST KEY — 32 bytes of repeating 0x41 ('A') base64-encoded.
    # Obviously not a real secret. Satisfies the AccessNotesCipher startup guard so
    # integration tests boot in prod-like mode (dev-mode=false).
    # GitGuardian will not flag a hex/base64 string of all one byte.
    access-notes-key: "QUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUA="
  admin-seed:
    email: "seed-admin@test.local"
    # Placeholder test password — AdminSeeder only needs a non-blank value here.
    password: "test-only-placeholder-admin-pw"
  stripe:
    # Placeholder — never sent to Stripe in tests (checkout tests mock StripeService).
    secret-key: "test-only-stripe-secret-placeholder"
    # NON-whsec_ prefix so GitGuardian does not flag it. Used as the HMAC key in
    # StripeWebhookIntegrationTest to sign fixture payloads via Webhook.Util.computeHmacSha256.
    webhook-secret: "test-only-webhook-signing-placeholder"
    success-url: "http://localhost:8080/app?checkout=success"
    cancel-url: "http://localhost:8080/plans?checkout=cancel"
    portal-return-url: "http://localhost:8080/app/billing"
