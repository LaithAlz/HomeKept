spring:
  application:
    name: HomeKept

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/homekept}
    username: ${DB_USERNAME:homekept}
    password: ${DB_PASSWORD:homekept}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  # Bind to the platform-injected PORT in production (Render/Cloudflare set it);
  # default to 8080 for local dev.
  port: ${PORT:8080}
  servlet:
    context-path: /
  # Honor X-Forwarded-Proto from the TLS-terminating proxy (Render/Cloudflare) so that
  # HttpServletRequest.isSecure() returns true in production even though the app sees HTTP.
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# Application-level configuration
app:
  timezone: ${APP_TIMEZONE:America/Toronto}
  # Belt-and-suspenders: set APP_SECURE_COOKIES=true in prod.
  # forward-headers-strategy above makes isSecure() true behind the TLS proxy as well.
  secure-cookies: ${APP_SECURE_COOKIES:false}
  # Set APP_DEV_MODE=true only in local development. NEVER in production.
  # When false (default), the app refuses to start if JWT_SIGNING_KEY is blank,
  # shorter than 32 bytes, or equals the well-known dev sentinel.
  dev-mode: ${APP_DEV_MODE:false}
  # Public base URL of the frontend, used to build links in transactional emails
  # (e.g. the activation magic link). Set FRONTEND_BASE_URL in production
  # (e.g. https://homekept.ca). Defaults to the local dev origin.
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:8080}
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGIN_1:http://localhost:5173}
      - ${CORS_ALLOWED_ORIGIN_2:http://localhost:4173}
  jwt:
    # DEV SENTINEL — clearly labelled, ≥32 bytes so the length check passes in dev-mode.
    # The startup guard in JwtService rejects this key when dev-mode=false (the default).
    signing-key: ${JWT_SIGNING_KEY:dev-sentinel-key-do-not-use-in-production-replace-me!!}
    access-token-expiry-seconds: 900      # 15 minutes
    refresh-token-expiry-seconds: 604800  # 7 days
  # Reserved for future property access-notes column-level encryption (V3 migration)
  encryption:
    access-notes-key: ${ACCESS_NOTES_ENC_KEY:}
  # Admin seed: when both are set and no user with that email exists, an ADMIN user
  # is created on startup (idempotent). See AdminSeeder. Never commit real values.
  admin-seed:
    email: ${ADMIN_SEED_EMAIL:}
    password: ${ADMIN_SEED_PASSWORD:}
  # Stripe integration. In production set all five STRIPE_* env vars.
  # The app logs a WARNING on startup if secret-key is blank.
  # NEVER commit real Stripe keys — use environment variable injection only.
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    success-url: ${STRIPE_SUCCESS_URL:http://localhost:8080/app?checkout=success}
    cancel-url: ${STRIPE_CANCEL_URL:http://localhost:8080/plans?checkout=cancel}
    portal-return-url: ${STRIPE_PORTAL_RETURN_URL:http://localhost:8080/app/billing}
  # Cloudflare R2 (S3-compatible) for visit photos. In production set all R2_* env vars.
  # If endpoint/bucket are blank the app starts but photo endpoints return 503 (graceful).
  # NEVER commit real R2 keys — use environment variable injection only.
  r2:
    endpoint: ${R2_ENDPOINT:}
    bucket: ${R2_BUCKET:}
    access-key-id: ${R2_ACCESS_KEY_ID:}
    secret-access-key: ${R2_SECRET_ACCESS_KEY:}
    region: ${R2_REGION:auto}
  # SendGrid transactional email (notification domain). In production set
  # SENDGRID_API_KEY and SENDGRID_FROM_EMAIL (a verified sender). If either is
  # blank, SendGridEmailSender logs and skips the send (no hard failure), so dev,
  # test, and CI run without a real key. NEVER commit a real API key.
  sendgrid:
    api-key: ${SENDGRID_API_KEY:}
    from-email: ${SENDGRID_FROM_EMAIL:}
    from-name: ${SENDGRID_FROM_NAME:HomeKept}
  # PostHog product analytics (analytics domain, arch doc §5.7). POSTHOG_API_KEY is the
  # publishable project key (not a secret, but still env-config, never hardcoded). If it
  # is blank, AnalyticsService.capture is a silent no-op, so dev, test, and CI run without
  # a key and emit no network calls. Analytics is best-effort: failures never break the
  # business transaction that triggered them.
  analytics:
    api-key: ${POSTHOG_API_KEY:}
    host: ${POSTHOG_HOST:https://us.i.posthog.com}
