<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>HomeKept</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #edf1ec; color: #11201a; display: grid; place-items: center; text-align: center; }
      @media (prefers-color-scheme: dark) { html, body { background: #0c1712; color: #e7efe8; } }
      .wrap { padding: 24px; max-width: 22rem; }
      h1 { font-size: 1.25rem; margin: 0 0 .5rem; }
      p { margin: 0; opacity: .8; line-height: 1.5; }
    </style>
  </head>
  <body>
    <!-- Offline fallback. Normal operation loads https://homekept.ca/app (capacitor.config server.url). -->
    <div class="wrap">
      <h1>HomeKept</h1>
      <p>Can't reach the server right now. Check your connection and reopen the app.</p>
    </div>
  </body>
</html>
